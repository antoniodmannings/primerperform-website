<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Primer Performance</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --slate: #3B5068;
      --bronze: #A0845C;
      --graphite: #4A4A4A;
      --field: #F2F5F7;
      --dark: #1C2938;
      --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      color: var(--graphite);
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .top-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--bronze) 0%, var(--slate) 100%);
    }
    .error-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .error-content {
      max-width: 480px;
    }
    .error-code {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 700;
      color: var(--slate);
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0.6;
    }
    .error-content h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 16px;
    }
    .error-content p {
      font-size: 16px;
      color: #8899AA;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn-home {
      display: inline-block;
      padding: 14px 40px;
      background: var(--slate);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.3s;
    }
    .btn-home:hover {
      background: var(--bronze);
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    footer {
      background: #0F1923;
      padding: 24px;
      text-align: center;
    }
    .footer-entity {
      font-size: 12px; color: #556677;
      margin-bottom: 4px;
    }
    .footer-copy {
      font-size: 11px; color: #3A4A5A;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <main class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has moved.</p>
      <a href="/index.html" class="btn-home">Return to Home</a>
    </div>
  </main>
  <footer>
    <p class="footer-entity">Primer Training and Consulting LLC | d/b/a Primer Performance</p>
    <p class="footer-copy">Integration Over Isolation&trade; | &copy; 2026 Antonio Devan Mannings. All rights reserved.</p>
  </footer>
</body>
</html>
